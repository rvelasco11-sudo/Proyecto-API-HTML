<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro de Vehículos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --border:    #2a2a2a;
      --accent:    #e8ff47;
      --accent2:   #ff6b35;
      --text:      #f0f0f0;
      --muted:     #666;
      --danger:    #ff4444;
      --success:   #44ff8a;
      --radius:    10px;
      --mono:      'DM Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow-x: hidden;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 24px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 22px;
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    header h1 span { color: var(--accent); }
    .api-badge {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 0.7rem;
      background: #1e2a00;
      color: var(--accent);
      border: 1px solid #3a5200;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    main {
      display: grid;
      grid-template-columns: 360px 1fr;
      height: calc(100vh - 73px);
    }

    .panel-left {
      border-right: 1px solid var(--border);
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      overflow-y: auto;
    }

    .section-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }
    label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    input[type="text"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      width: 100%;
    }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,255,71,0.1);
    }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn {
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      border: none; cursor: pointer;
      font-family: var(--sans);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      border-radius: var(--radius);
      padding: 13px 20px;
      transition: all 0.15s;
      width: 100%;
    }
    .btn-primary {
      background: var(--accent);
      color: #0d0d0d;
    }
    .btn-primary:hover { background: #d4eb00; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid #3a1010;
    }
    .btn-danger:hover { background: #2a0808; border-color: var(--danger); }

    .btn-accent2 {
      background: var(--accent2);
      color: #fff;
    }
    .btn-accent2:hover { background: #e55a28; transform: translateY(-1px); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    .action-row {
      display: flex; gap: 8px;
    }
    .action-row input { flex: 1; }
    .action-row .btn { width: auto; padding: 13px 16px; }

    .panel-right {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-right-header {
      padding: 24px 32px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .panel-right-header h2 {
      font-size: 1rem;
      font-weight: 700;
    }
    .count-badge {
      background: var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .btn-list {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 700;
      font-size: 0.8rem;
      padding: 8px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-list:hover { border-color: var(--accent); color: var(--accent); }

    .table-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 0 32px 32px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }
    thead th {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
      animation: rowIn 0.3s ease forwards;
    }
    tbody tr:hover { background: var(--surface); }
    tbody td {
      padding: 16px 12px;
      font-size: 0.88rem;
    }
    .td-placa {
      font-family: var(--mono);
      font-weight: 500;
      color: var(--accent);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
    }
    .td-marca { font-weight: 600; }
    .td-modelo { color: #aaa; }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      padding: 80px 20px;
      text-align: center;
    }
    .empty-icon { font-size: 3rem; opacity: 0.4; }
    .empty-state p { font-size: 0.85rem; line-height: 1.6; }

    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      min-width: 260px;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.25s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); pointer-events: all; }
    #toast.success { border-color: var(--success); }
    #toast.error   { border-color: var(--danger); }
    #toast.info    { border-color: #3a4a8a; }
    .toast-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    #toast.success .toast-dot { background: var(--success); }
    #toast.error   .toast-dot { background: var(--danger); }
    #toast.info    .toast-dot { background: #6688ff; }

    .highlight { background: #1a2200 !important; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .panel-left { border-right: none; border-bottom: 1px solid var(--border); max-height: 60vh; }
      header { padding: 16px 20px; }
      .panel-right-header, .table-wrap { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-icon">🚗</div>
  <h1>Registro de <span>Vehículos</span></h1>
  <span class="api-badge">localhost:3000</span>
</header>

<main>
  <aside class="panel-left">
    <section>
      <p class="section-label">➕ Agregar Vehículo</p>
      <div class="form-group">
        <label>Placa</label>
        <input type="text" id="inp-placa" placeholder="FVQ2345A" maxlength="12"/>
      </div>
      <div class="form-group">
        <label>Marca</label>
        <input type="text" id="inp-marca" placeholder="Nissan"/>
      </div>
      <div class="form-group">
        <label>Modelo</label>
        <input type="text" id="inp-modelo" placeholder="Versa"/>
      </div>
      <button class="btn btn-primary" onclick="agregarVehiculo()">
        <span>＋</span> Agregar
      </button>
    </section>

    <div class="divider"></div>

    <section>
      <p class="section-label">🔍 Buscar por Placa</p>
      <div class="action-row">
        <input type="text" id="inp-buscar" placeholder="FVQ2345A"/>
        <button class="btn btn-secondary" onclick="buscarVehiculo()" title="Buscar">🔍</button>
      </div>
    </section>

    <div class="divider"></div>

    <section>
      <p class="section-label">🗑️ Eliminar por Placa</p>
      <div class="action-row">
        <input type="text" id="inp-eliminar" placeholder="FVQ2345A"/>
        <button class="btn btn-danger" onclick="eliminarVehiculo()" title="Eliminar">✕</button>
      </div>
    </section>

  </aside>

  <div class="panel-right">
    <div class="panel-right-header">
      <h2>Vehículos Registrados</h2>
      <span class="count-badge" id="count">0</span>
      <button class="btn-list" onclick="listarVehiculos()">
        ↺ Actualizar lista
      </button>
    </div>
    <div class="table-wrap">
      <div id="tabla-container">
        <div class="empty-state">
          <div class="empty-icon">🚘</div>
          <p>No hay vehículos cargados.<br/>Haz clic en <strong>Actualizar lista</strong> o agrega uno nuevo.</p>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- TOAST -->
<div id="toast">
  <span class="toast-dot"></span>
  <span id="toast-msg"></span>
</div>

<script>
  const API = 'http://localhost:3000/vehiculos';
  let toastTimer = null;

  function toast(msg, type = 'info') {
    const el = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    el.className = `show ${type}`;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
  }

  function renderTabla(data, resaltarPlaca = null) {
    const container = document.getElementById('tabla-container');
    document.getElementById('count').textContent = data.length;

    if (!data.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🚘</div>
          <p>No se encontraron vehículos.</p>
        </div>`;
      return;
    }

    const filas = data.map(v => `
      <tr class="${resaltarPlaca && v.placa === resaltarPlaca ? 'highlight' : ''}">
        <td class="td-placa">${v.placa}</td>
        <td class="td-marca">${v.marca}</td>
        <td class="td-modelo">${v.modelo}</td>
      </tr>
    `).join('');

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Placa</th>
            <th>Marca</th>
            <th>Modelo</th>
          </tr>
        </thead>
        <tbody>${filas}</tbody>
      </table>`;
  }

  async function listarVehiculos() {
    try {
      const res = await fetch(API);
      const json = await res.json();
      renderTabla(json.data);
      toast(`${json.total} vehículo(s) cargado(s)`, 'info');
    } catch {
      toast('No se pudo conectar con la API', 'error');
    }
  }

  async function agregarVehiculo() {
    const placa  = document.getElementById('inp-placa').value.trim();
    const marca  = document.getElementById('inp-marca').value.trim();
    const modelo = document.getElementById('inp-modelo').value.trim();

    if (!placa || !marca || !modelo) {
      toast('Completa todos los campos', 'error');
      return;
    }

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ placa, marca, modelo })
      });
      const json = await res.json();
      if (!res.ok) { toast(json.mensaje, 'error'); return; }

      toast(`Vehículo ${json.data.placa} agregado ✓`, 'success');
      document.getElementById('inp-placa').value = '';
      document.getElementById('inp-marca').value = '';
      document.getElementById('inp-modelo').value = '';
      listarVehiculos();
    } catch {
      toast('Error al conectar con la API', 'error');
    }
  }

  async function buscarVehiculo() {
    const placa = document.getElementById('inp-buscar').value.trim().toUpperCase();
    if (!placa) { toast('Ingresa una placa para buscar', 'error'); return; }

    try {
      const res = await fetch(`${API}/${placa}`);
      const json = await res.json();
      if (!res.ok) { toast(json.mensaje, 'error'); return; }

      renderTabla([json.data], placa);
      document.getElementById('count').textContent = 1;
      toast(`Vehículo encontrado: ${placa}`, 'success');
    } catch {
      toast('Error al conectar con la API', 'error');
    }
  }

  async function eliminarVehiculo() {
    const placa = document.getElementById('inp-eliminar').value.trim().toUpperCase();
    if (!placa) { toast('Ingresa una placa para eliminar', 'error'); return; }

    try {
      const res = await fetch(`${API}/${placa}`, { method: 'DELETE' });
      const json = await res.json();
      if (!res.ok) { toast(json.mensaje, 'error'); return; }

      toast(`Vehículo ${placa} eliminado`, 'success');
      document.getElementById('inp-eliminar').value = '';
      listarVehiculos();
    } catch {
      toast('Error al conectar con la API', 'error');
    }
  }
  document.getElementById('inp-modelo').addEventListener('keydown', e => { if (e.key === 'Enter') agregarVehiculo(); });
  document.getElementById('inp-buscar').addEventListener('keydown', e => { if (e.key === 'Enter') buscarVehiculo(); });
  document.getElementById('inp-eliminar').addEventListener('keydown', e => { if (e.key === 'Enter') eliminarVehiculo(); });
</script>
</body>
</html>
